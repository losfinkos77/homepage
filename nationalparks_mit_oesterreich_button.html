  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: white;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      color: #00bfff;
      text-shadow: 0 0 10px #00bfff44;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      font-size: 18px;
      margin-bottom: 35px;

      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;

      background: #2c2c2c;
      color: #00bfff;
      text-decoration: none;
      border-radius: 18px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);

      font-size: 17px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .menu-button i {
      font-size: 20px;
    }

    .menu-button:hover {
      background: #00bfff;
      color: #1e1e1e;
      transform: scale(1.05);
      box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    }

    .back-button {
      max-width: 260px;
      margin: 40px auto 0 auto;
    }

    @media (max-width: 600px) {
      .menu-button {
        flex: 1 1 100%;
      }

      h1 {
        font-size: 38px;
      }
    }
  </style>
</head>
