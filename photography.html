<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photography | Los Finkos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: white;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      color: #00bfff;
      text-shadow: 0 0 10px #00bfff44;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      font-size: 18px;
      margin-bottom: 35px;
    }

    .menu-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
      gap: 20px;
    }

    .menu-button {
      flex: 1 1 40%;
      background: #2c2c2c;
      color: #00bfff;
      text-decoration: none;
      border-radius: 18px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      padding: 22px;
      font-size: 17px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .menu-button i {
      font-size: 20px;
    }

    .menu-button:hover {
      background: #00bfff;
      color: #1e1e1e;
      transform: scale(1.05);
      box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    }

    .back-button {
      max-width: 260px;
      margin: 40px auto 0 auto;
    }

    @media (max-width: 600px) {
      .menu-button {
        flex: 1 1 100%;
      }

      h1 {
        font-size: 38px;
      }
    }
  </style>
</head>

<body>
  <h1>Photography</h1>
  <p>Astro, moon, weather and photo planning</p>

  <div class="menu-container">
    <a href="https://stellarium-web.org/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-star"></i> Stars / Stellarium
    </a>

    <a href="https://www.timeanddate.com/moon/phases/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-moon"></i> Moon Phases
    </a>

    <a href="https://www.lightpollutionmap.info/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-earth-europe"></i> Light Pollution Map
    </a>

    <a href="https://clearoutside.com/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-cloud-moon"></i> Astro Weather
    </a>

    <a href="https://www.windy.com/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-cloud"></i> Weather / Clouds
    </a>

    <a href="https://www.suncalc.org/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-sun"></i> Sunrise / Sunset
    </a>

    <a href="https://www.meteoblue.com/" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-cloud-sun-rain"></i> Meteoblue
    </a>

    <a href="https://www.swpc.noaa.gov/products/aurora-30-minute-forecast" class="menu-button" target="_blank" rel="noopener noreferrer">
      <i class="fas fa-solar-panel"></i> Aurora / Space Weather
    </a>
  </div>

  <a href="index.html" class="menu-button back-button">
    <i class="fas fa-arrow-left"></i> Back to home
  </a>
</body>
</html>
